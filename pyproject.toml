[tool.black]
line-length = 120
target-version = ["py39"]

[tool.ruff]
line-length = 120
target-version = "py39"

[tool.ruff.lint]
select = ["E9", "F401", "F63", "F7", "F82", "C901"]
ignore = []
mccabe.max-complexity = 18

[tool.ruff.lint.per-file-ignores]
"qspr_app.py" = ["C901"]
"modules/diagnostics_ui.py" = ["C901"]
"modules/prognostic_model_core.py" = ["C901"]
"modules/qspr_core.py" = ["C901"]
"modules/saod2_core.py" = ["C901"]
"modules/spectra_core.py" = ["C901"]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
follow_imports = "skip"
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
no_implicit_optional = true
show_error_codes = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=modules --cov-report=term-missing --cov-report=xml"
