name: Static audit

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff black mypy pytest coverage pytest-cov kaleido

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy
        run: mypy qspr_app.py modules tests

      - name: Function usage audit
        run: python scripts/audit_functions.py --output function_audit.csv --fail-on-duplicates

      - name: Upload function audit
        uses: actions/upload-artifact@v4
        with:
          name: function-audit
          path: function_audit.csv

      - name: Pytest with coverage
        run: coverage run -m pytest

      - name: Coverage report
        run: coverage report -m

      - name: Streamlit smoke test
        run: |
          python -m streamlit run qspr_app.py --server.headless true --server.port 8501 > streamlit-smoke.log 2>&1 &
          STREAMLIT_PID=$!
          for i in {1..30}; do
            if curl -fsS http://localhost:8501/_stcore/health >/dev/null; then
              kill $STREAMLIT_PID
              wait $STREAMLIT_PID || true
              exit 0
            fi
            if ! kill -0 $STREAMLIT_PID 2>/dev/null; then
              cat streamlit-smoke.log
              exit 1
            fi
            sleep 2
          done
          cat streamlit-smoke.log
          kill $STREAMLIT_PID
          exit 1
